<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="This page is the menu for the user to select contacts.">
<title>User Paradise</title>
	<script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet"> 	
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">

    <script type="text/javascript">
	document.addEventListener('DOMContentLoaded', function() 
	{
		readCookie();
	}, false);
	</script>


</head>

<body>

<h1 id="UserParadise">User Paradise</h1>


<div id="ContactBook"> <br />
 <h1>Search or delete contacts:</h1>
 
	<input type="text" id="ContactFirstSearch" placeholder="Search by First Name"/>
	<input type="text" id="ContactLastSearch" placeholder="Search by Last Name"/>
	<button type="button" id="ContactSearchButton" class="buttons" onclick="searchContact();"> Search Contact </button><br />
	<span id="contactSearchResult"></span>
 
 
	<p id="ContactList"></p>
 <button type="button" id="contactDeleteButton" class="buttons" onclick="deleteContact();"> Delete Contact </button><br />
	<span id="contactDelResult"></span>



    <h1>Add or edit contacts:</h1>
	<input type="text" id="contactAddFirst" placeholder="Contact FirstName"/>
	<input type="text" id="contactAddLast" placeholder="Contact LastName"/>
	<input type="text" id="contactAddPhone" placeholder="Contact Phone"/>
    <input type="text" id="contactAddEmail" placeholder="Contact Email (optional)"/>
	<button type="button" id="contactAddButton" class="buttons" onclick="addContact();"> Add Contact </button><br />
	<span id="contactAddResult"></span>


	<button type="button" id="contactEditButton" class="buttons" onclick="editContact();"> Edit Contact </button><br />
	<span id="contactEditResult"></span>
</div>

<div id="back">
	<span id="backB"></span><br />
	<button type="button" id="backbutton" class="buttons" onclick="goBack();"> Back </button>
</div>


</body>
</html>
