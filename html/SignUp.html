<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="This page is the sign up page for the user to create an account.">
	<title>NutriPlan &mdash; Personalized Healthy Recipes</title>
	<script type="text/javascript" src="../js/config.js"></script>
	<script type="text/javascript" src="../js/md5.js"></script>
	<script type="text/javascript" src="../js/User.js"></script>
 <script type="text/javascript" src="../js/auth.js"></script>
 <script type="text/javascript" src="../js/cookies.js"></script>
   <link rel="stylesheet" href="../css/signup.css">
   <link rel="stylesheet" href="../css/TopNav.css">
     <link rel="stylesheet" href="/css/searchOv.css">
  
    
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
		

	
</head>


<body>

<!-- ===== TOP NAV ===== -->
  <header class="topnav">

    <div class="nav-left">
        <button class="search-link" id="searchToggle" type="button">
            <span class="icon">&#128269;</span>
            Search Recipes
        </button>

        <nav class="top-links">
            <a href="../index.html">Home</a>
            <a href="../html/faq.html">FAQ</a>
            <a href="../html/SignUp.html">Sign Up</a>
        </nav>
    </div>

    <div class="login-box">
        <form>
            <input type="text" id="loginName" placeholder="Username">
            <input type="password" id="loginPassword" placeholder="Password">
            <button type="button" class="buttons" onclick="doLogin()">Login</button>
        </form>

        <span id="loginResult"></span>
    </div>

</header>

 <!-- ===== SEARCH OVERLAY (hidden until toggled) ===== -->
  <div class="search-overlay" id="searchOverlay" role="dialog" aria-modal="true" aria-labelledby="searchLabel">
    <form class="search-box" id="searchForm">
      <button type="button" class="close-btn" id="searchClose" aria-label="Close search">&times;</button>
      <label class="sr-only" id="searchLabel" for="searchInput">Search recipes</label>
      <input type="text" id="searchInput" name="q" placeholder="Search recipes, ingredients, cuisines..." autocomplete="off">
      <button type="submit">Search</button>

    
    
      <!-- Filters -->
      <div class="filter-group">
      <h3>Meal Type</h3>
     <!-- Vegan | DairyFree | GlutenFree | Garlic | Caffeine | Halal | Kosher | Vegetarian | MealCost -->

        <label><input type="checkbox" name="mealType" value="Vegan"> Vegan</label>
        <label><input type="checkbox" name="mealType" value="Dairy Free"> Dairy-Free</label>
        <label><input type="checkbox" name="mealType" value="GlutenFree"> Gluten-Free</label>
        <label><input type="checkbox" name="mealType" value="Garlic Free"> Garlic</label>
        <label><input type="checkbox" name="mealType" value="Caffeine Free"> Caffeine</label>
        <label><input type="checkbox" name="mealType" value="Halal"> Halal</label>
        <label><input type="checkbox" name="mealType" value="Kosher"> Kosher</label>
        <label><input type="checkbox" name="mealType" value="Vegetarian"> Vegetarian</label>
     
      </div>

      <div class="filter-group">
        <h3>Budget</h3>
        <label><input type="checkbox" name="budget" value="5"> Under $5</label>
        <label><input type="checkbox" name="budget" value="5-10"> $5-$10</label>
        <label><input type="checkbox" name="budget" value="10plus"> $10 and above</label>
      </div>

    
  

    
    
    
    </form>
  </div>




<section class="hero">
  <h1 class="logo">NutriPlan:SignUp</h1>

<div id="signup">
  <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Zm9vZHxlbnwwfHwwfHx8MA%3D%3D" alt="a delicious food bowl with chicken and vegetables" class="signup-image">

  <div class="signup-form">
    <input type="text" id="FirstName" placeholder="FirstName?"/>
    <input type="text" id="LastName" placeholder="LastName?"/>
    <input type="text" id="User" placeholder="Username"/>
    <input type="password" id="Password" placeholder="Password"/>
    
		
    <span id="NewAccount"></span>
  </div>
  


</div>
<div class="signup-form_Button">

    <button type="button" id="SubSignUp" class="buttons" onclick="addUser();"> Sign me up! </button><br />

  </div>
</section>

</body>
</html>
