<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nutrition tracker dashboard after login">
    <title>Nutrition Tracker</title>

    <!-- External Resources -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <script src="js/code.js"></script>
    <link rel="stylesheet" href="css/style.css">   

</head>

<body>

    <div id="dashboard">

        <!-- HEADER -->
        <div id="header">
            <h1><span id="userName"></span>! 🥳</h1>
            <p id="currentDate">Loading...</p>
            <button id="refreshBtn">🔄 Refresh</button>
        </div>

        <!-- TODAY'S NUTRITION -->
        <div class="nutrition-card">
            <h2>Today's Nutrition</h2>

            <div class="nutrition-stat">
                <span><span id="caloriesEaten">0</span> of <span id="caloriesGoal">0</span> Calories</span>
                <span class="percentage" id="caloriesPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="caloriesProgress"></div>
            </div>

            <div class="nutrition-stat">
                <span>Protein: <span id="proteinEaten">0</span>g of <span id="proteinGoal">0</span>g</span>
                <span class="percentage" id="proteinPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress" id="proteinProgress"></div>
            </div>
        </div>

        <!-- TODAY'S MEAL PLAN -->
        <div class="nutrition-card">
            <h2>Today's Meal Plan</h2>
            <div id="meal-container">
                <div class="loading-text">Loading meals...</div>
            </div>
        </div>

        <!-- QUICK ADD -->
        <div class="nutrition-card">
            <h2>Quick Add</h2>
            <div class="quick-add-grid">
                <button id="addMealBtn" class="quick-add-btn">➕ Add Meal</button>
                <button id="addFoodBtn" class="quick-add-btn">🍎 Add Food</button>
                <button id="addRecipeBtn" class="quick-add-btn">📖 Add Recipe</button>
                <button id="scanBarcodeBtn" class="quick-add-btn">📷 Scan Barcode</button>
            </div>
        </div>

        <!-- WEEKLY OVERVIEW -->
        <div class="nutrition-card">
            <h2>Weekly Overview</h2>
            <div class="week-days" id="week-container">
                <div class="loading-text">Loading...</div>
            </div>
        </div>

        <!-- SUGGESTIONS -->
        <div class="nutrition-card">
            <h2>Suggestions for Today</h2>
            <div id="suggestions-container">
                <div class="loading-text">Loading suggestions...</div>
            </div>
        </div>

        <!-- GROCERY LIST -->
        <div class="nutrition-card">
            <h2>Grocery List</h2>
            <p class="grocery-count-text">
                You need <span id="grocery-count">0</span> items for this week
            </p>
            <div class="grocery-items" id="grocery-items">
                <span class="loading-text">Loading...</span>
            </div>
        </div>

        <!-- LOGOUT -->
        <div class="logout-container">
            <button id="logoutButton" class="buttons">Log Out</button>
        </div>

    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <button id="navHome" class="nav-item active">
            <span class="nav-icon">🏠</span>
            Home
        </button>
        <button id="navPlan" class="nav-item">
            <span class="nav-icon">📋</span>
            Plan
        </button>
        <button id="navRecipes" class="nav-item">
            <span class="nav-icon">📖</span>
            Recipes
        </button>
        <button id="navProfile" class="nav-item">
            <span class="nav-icon">👤</span>
            Profile
        </button>
    </div>

</body>
</html>
