<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This page is the login page for the user to log in or sign up.">
    <title>User Paradise</title>
<link rel="preconnect" href="https://menu.html">
<link rel="preconnect" href="https://color.html">
<link rel="preconnect" href="https://contacts.html">
<link rel="preconnect" href="https://SignUp.html">
    <script type="text/javascript" src="js/md5.js"></script>
    <script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
</head>

<body>

    <h1 id="UserParadise">User Paradise</h1>

    <div id="LoginDiv">
        <span id="inner-title">PLEASE LOGIN</span>
        <input type="text" id="loginName" placeholder="Username"/><br />
        <input type="password" id="loginPassword" placeholder="Password"/><br/>
        <button type="button" id="loginButton" class="buttons" onclick="doLogin();"> Login </button>
        <span id="loginResult"></span>
    </div>

    <div id="SignupDiv">
        <h1 id="SignUp">No account? Sign Up!</h1>
        <button type="button" id="signupButton" class="buttons" onclick="doSignup();"> Sign Up </button>
        <span id="loginResult"></span>
          
    </div>

</body>

</html>
